app:
  security:
    jwt:
      expiry:
        accessToken: 900000 # 15 * 60 * 1000
        refreshToken: 604800000 # 7 * 24 * 60 * 60 * 1000
      issuer: http://localhost:8080/
      audiences:
        - http://localhost:8080/
      secret: "RGvn4bm2Xs#Tf66^&kOy45xd%4r4hw%&qDwI*hHlF1xi&xtpvlLF6Ji0!t66dnOo"

spring:
  application:
    name: apollum
  datasource:
    url: jdbc:postgresql://localhost:5432/apollum?useSSL=false
    username: postgres
    password: 123
  jpa:
    defer-datasource-initialization: true
    show-sql: true # To see all SQL statements formed by Hibernate
    hibernate:
      ddl-auto: validate # This will create schemas and delete them automatically when application stops and runs.
                       # Use `validate` or `none` for production
    properties:
      hibernate:
        format_sql: false # Format SQL when printing to console.
  sql:
    init:
      mode: never # This tells spring "when" to run SQL init scripts
      data-locations: classpath:data.sql
  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: Ukd2bjRibTJYcyNUZjY2XiZrT3k0NXhkJTRyNGh3JSZxRHdJKmhIbEYxeGkmeHRwdmxMRjZKaTAhdDY2ZG5Pbw==

springdoc:
  api-docs:
    enabled: true
    path: /openapi.json
  swagger-ui:
    enabled: true
    path: /swagger
    url: /openapi.json
    syntaxHighlight:
      theme: obsidian
    disable-swagger-default-url: true
    use-root-path: true
    tryItOutEnabled: true
    persistAuthorization: false
    oauth:
      appName: ''
      clientId: ''
      clientSecret: ''
      scopes: ''

